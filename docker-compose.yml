version: "3.8"

services:
  # Servidor de Base de Datos PostgreSQL
  postgres_db:
    image: postgres:15-alpine
    container_name: kropy_postgres_multitenant
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: payload-example-multi-tenant
      # 👇 Esta variable quita las restricciones de pg_hba.conf para desarrollo local
    command: postgres -c listen_addresses='*' -c hba_file=/var/lib/postgresql/data/pg_hba.conf
    ports:
      - "5432:5432"
    volumes:
      # Mapeo del volumen local para mantener los datos a salvo si el contenedor cae
      - ./.docker-data/postgres:/var/lib/postgresql/data
    networks:
      - payload_network

networks:
  payload_network:
    driver: bridge
